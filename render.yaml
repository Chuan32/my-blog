services:
  - type: web
    name: my-blog
    runtime: node
    repo: https://github.com/Chuan32/my-blog
    plan: free
    region: singapore
    branch: main
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20
