<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - 我的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">My Blog</a>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="admin.html">发布</a>
        <a href="profile.html" id="navProfile" style="display:none">个人主页</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="切换主题">🌙</button>
    </div>
  </header>

  <main class="container">
    <article class="post-full" id="postContent">
      <p class="loading-text">加载中...</p>
    </article>

    <!-- Like -->
    <div class="post-actions" id="likeArea">
      <button class="like-btn" id="likeBtn">
        <span id="likeIcon">♡</span>
        <span id="likeCount">0</span>
      </button>
    </div>

    <!-- Comments -->
    <section class="comments-section" id="commentsArea">
      <h2>评论</h2>
      <div id="commentFormArea"></div>
      <div id="commentList"><p class="loading-text">加载中...</p></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
