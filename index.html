<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">My Blog</a>
      <nav class="nav">
        <a href="index.html" class="active">首页</a>
        <a href="about.html">关于</a>
        <a href="admin.html">发布</a>
        <a href="profile.html" id="navProfile" style="display:none">个人主页</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="切换主题">🌙</button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>欢迎来到我的博客</h1>
      <p>记录技术、生活和思考</p>
    </section>

    <section class="search-section">
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜索文章标题或内容..." class="search-input">
        <button id="searchBtn" class="search-btn">🔍</button>
        <button id="clearSearchBtn" class="clear-search-btn" style="display:none;">✕</button>
      </div>
      <div id="searchResultsInfo" class="search-results-info" style="display:none;"></div>
      <div class="tag-filter" id="tagFilter">
        <button class="tag-filter-btn active" data-tag="全部">全部</button>
      </div>
    </section>

    <section class="posts" id="postList">
      <p class="loading-text">加载中...</p>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 My Blog. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
